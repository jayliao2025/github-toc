name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          release-type: node
          package-name: github-toc
          version-file: package.json
          bump-minor-pre-major: true
          bump-patch-for-minor-pre-major: true

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - name: Install jq
        if: ${{ steps.release.outputs.release_created }}
        run: sudo apt-get install -y jq

      - name: Sync manifest.json version
        if: ${{ steps.release.outputs.release_created }}
        run: |
          VERSION="${{ steps.release.outputs.tag_name }}"
          VERSION=${VERSION#v}
          jq --arg v "$VERSION" '.version = $v' src/manifest.json > src/manifest.tmp.json
          mv src/manifest.tmp.json src/manifest.json

      - name: Commit manifest.json version update
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add src/manifest.json
          git commit -m "chore: sync manifest.json version to ${{ steps.release.outputs.tag_name }}"
          git push
